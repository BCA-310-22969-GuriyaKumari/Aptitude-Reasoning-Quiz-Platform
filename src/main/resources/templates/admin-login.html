<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body class="admin-login-root">
    <nav class="site-nav">
        <div class="nav-inner">
            <div class="site-brand">Quiz App</div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/admin/login" class="nav-link">Admin</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row gx-4 align-items-center">
            <div class="col-12 col-md-6 text-center mb-4 mb-md-0">
                <div class="image-box mx-auto" style="max-width:480px;">
                    <img th:src="@{/images/download.png}" class="auth-illustration shadow-sm" alt="Project illustration">
                </div>
            </div>

            <div class="col-12 col-md-6 d-flex align-items-center">
                <div class="auth-card mx-auto">
                    <h3 class="mb-2">Admin Portal Login</h3>
                    <p class="text-muted mb-3">Enter admin credentials to access the dashboard.</p>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form action="/admin/login" method="post">
                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" name="username" class="form-control" placeholder="username" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" placeholder="passworrd" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Login</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/" class="text-muted">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-bar text-center">
        © Guriya Kumari
    </footer>
</body>
</html>
