<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/scoreboard-page.css}">
    <title>Scoreboard Page</title>
</head>
<body>
<!-- NavBar -->
<div th:replace="~{fragments/navbar.html :: navbar}"></div>

<div class="container main-container">
    <div class="scoreboard-card">
        <div class="scoreboard-heading">
            <h3>Top Performers</h3>
            <p>Highest scores from recent quiz attempts</p>
        </div>

        <div class="table-wrapper">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Score</th>
                        <th>Subject</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result : ${results}" th:classappend="${result.category} == 'APTITUDE' ? ' aptitude-row' : ' reasoning-row'">
                        <td th:text="${result.username}"></td>
                        <td th:text="${result.totalCorrect}"></td>
                        <td class="subject" th:text="${result.category}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/footer.html :: footer}"></div>
</body>
</html>
