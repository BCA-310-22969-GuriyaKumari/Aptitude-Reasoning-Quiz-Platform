<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/admin-results.css}">
</head>
<body class="admin-root">
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="px-4">
            <h3>Admin Panel</h3>
            <div class="admin-nav list-group">
                <a href="/admin/dashboard" class="list-group-item list-group-item-action">Dashboard</a>
                <a href="/admin/questions" class="list-group-item list-group-item-action">Questions</a>
                <a href="/admin/results" class="list-group-item list-group-item-action active">Results</a>
                <a href="/admin/logout" class="list-group-item list-group-item-action text-danger">Logout</a>
            </div>
        </div>
    </aside>

    <main class="admin-main">
        <div class="container">
            <div class="admin-heading mb-4 d-flex align-items-center justify-content-between">
                <div>
                    <h1>Quiz Results</h1>
                    <p>View all student quiz attempts and access analytics reports.</p>
                </div>
                <div>
                    <a href="/admin/results/analytics" class="btn btn-primary">See Students Analytics Report</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Total Correct</th>
                            <th>Category</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="result : ${results}">
                            <td th:text="${result.id}">1</td>
                            <td th:text="${result.username}">student</td>
                            <td th:text="${result.totalCorrect}">8</td>
                            <td th:text="${result.category}">APTITUDE</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
