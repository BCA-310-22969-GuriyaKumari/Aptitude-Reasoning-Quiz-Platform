<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Subject - Quiz Platform</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
                        linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #102a43;
        }

        .main-container {
            min-height: 100vh;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .hero-card {
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 32px;
            background: rgba(255,255,255,0.92);
            border-radius: 30px;
            border: 1px solid rgba(59,130,246,0.14);
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.08);
        }

        .title-text {
            font-weight: 800;
            color: #1e40af;
            font-size: 2.75rem;
            line-height: 1.05;
        }

        .subtitle-text {
            color: #475569;
            font-size: 1.05rem;
            margin-top: 12px;
        }

        .selection-card {
            border-radius: 28px;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            background: #ffffff;
            border: 1px solid rgba(37, 99, 235, 0.12);
            padding: 36px 28px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .selection-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 26px 60px rgba(15, 23, 42, 0.12);
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: #dbeafe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            margin: 0 auto 22px auto;
        }

        .selection-card h4 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1e3a8a;
        }

        .selection-card p {
            color: #475569;
            line-height: 1.65;
        }

        .start-btn {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-radius: 999px;
            padding: 12px 26px;
            font-weight: 700;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.22);
        }

        .footer-bar {
            background: #0b5ed7;
            color: white;
            padding: 16px 0;
            font-weight: 600;
        }

        .submit-btn {
            background: none;
            border: none;
            width: 100%;
            padding: 0;
        }

        @media (max-width: 767px) {
            .hero-card {
                padding: 28px 22px;
            }

            .title-text {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container main-container d-flex flex-column justify-content-center align-items-center text-center">
    <div class="hero-card text-center">
        <img src="/images/projectImg.jpeg" width="220" class="mb-4 rounded-4 shadow-sm" alt="Quiz illustration">

        <h1 class="title-text">Choose Your Challenge</h1>
        <p class="subtitle-text">Select a subject and start your quiz journey with a strong focus on speed and accuracy.</p>
    </div>

    <form th:action="@{/start-quiz}" method="post" class="row w-100 gx-4 gy-4">
        <input type="hidden" name="username" th:value="${username}" />

        <!-- Reasoning -->
        <div class="col-md-6 mb-4">
            <button type="submit" name="subject" value="REASONING" class="submit-btn">
                <div class="card selection-card shadow-sm">
                    <div class="icon-circle">🧠</div>
                    <h4 class="fw-bold">Reasoning</h4>
                    <p class="text-muted">Test your logical and analytical skills.</p>
                    <div class="mt-3">
                        <span class="start-btn">Start Reasoning Quiz →</span>
                    </div>
                </div>
            </button>
        </div>

        <!-- Aptitude -->
        <div class="col-md-6 mb-4">
            <button type="submit" name="subject" value="APTITUDE" class="submit-btn">
                <div class="card selection-card shadow-sm">
                    <div class="icon-circle">🔢</div>
                    <h4 class="fw-bold">Aptitude</h4>
                    <p class="text-muted">Challenge your mathematical ability.</p>
                    <div class="mt-3">
                        <span class="start-btn">Start Aptitude Quiz →</span>
                    </div>
                </div>
            </button>
        </div>

    </form>

</div>

<!-- Footer -->
<div class="footer-bar text-center">
    🏆 Test Yourself. Improve Yourself. Achieve More.
</div>

</body>
</html>
